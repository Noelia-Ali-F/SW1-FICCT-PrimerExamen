server:
  port: 8083

spring:
  data:
    mongodb:
      uri: mongodb://localhost:27017/exsw1

app:
  tasks:
    # Con JWT activo: si true, «Mis actividades» muestra tareas globales cuando no hay coincidencia rol/usuario (demo/UAT).
    lenient-my-tasks: ${APP_TASKS_LENIENT:true}
  seed:
    realistic: ${APP_SEED_REALISTIC:false}
  ai:
    baseUrl: ${APP_AI_BASEURL:http://localhost:8000}
    assistant:
      enabled: ${APP_AI_ASSISTANT_ENABLED:true}
    # vacío o "auto": usa Gemini si existe GEMINI_API_KEY; si no, OpenAI/Azure. Forzar: gemini | openai | azure
    provider: ${APP_AI_PROVIDER:}
    openai:
      apiKey: ${OPENAI_API_KEY:}
      baseUrl: ${OPENAI_BASE_URL:https://api.openai.com/v1}
      model: ${OPENAI_MODEL:gpt-4o-mini}
    azure:
      endpoint: ${AZURE_OPENAI_ENDPOINT:}
      deployment: ${AZURE_OPENAI_DEPLOYMENT:}
      apiVersion: ${AZURE_OPENAI_API_VERSION:2024-10-01-preview}
    gemini:
      apiKey: ${GEMINI_API_KEY:}
      model: ${GEMINI_MODEL:gemini-1.5-flash}
  jwt:
    # En producción, sobreescribe con variable de entorno o secreto seguro.
    secret: change-me-in-prod
    ttlMinutes: 240
  security:
    enabled: false

